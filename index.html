<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POE1 重組器機率計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Fira+Code:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0e6d0;--bg2:#e0ccaa;--bg3:#d4bc94;--bg4:#c8ac80;
  --border:#8a6428;--border2:#7a5418;
  --gold:#8a6010;--gold2:#a07830;
  --blue:#2a5888;--red:#882828;--green:#286840;
  --orange:#a04820;--purple:#602880;
  --t1:#2a1a08;--t2:#5a3a18;--t3:#8a6840;--t4:#b8a070;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:'Crimson Text',Georgia,serif;font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:14px;transition:all .15s}
button:hover{filter:brightness(1.18)}button:active{transform:scale(.97)}
input,textarea{font-family:'Crimson Text',serif;font-size:14px}
input:focus,textarea:focus{outline:1px solid var(--gold)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg3)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.mono{font-family:'Fira Code',monospace;font-size:13px}
.card{background:var(--bg2);border:2px solid var(--border);border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(100,60,0,.15)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:4px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--t3);transition:all .15s;user-select:none}
.overlay{position:fixed;inset:0;background:rgba(42,26,8,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:fadeIn .15s}
.modal{background:var(--bg2);border:1px solid var(--gold2);border-radius:8px;padding:22px;max-width:580px;width:100%;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.tier-btn{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--t1);font-size:13px;width:100%;text-align:left;font-family:'Crimson Text',serif;transition:all .12s}
.tier-btn:hover{background:var(--bg4);border-color:var(--gold)}
.mod-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:28px}
.mod-row:hover{background:var(--bg4)}
.dist-bar{display:flex;height:26px;border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.dist-seg{display:flex;align-items:center;justify-content:center;font-size:11px;border-right:1px solid var(--border)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:600px){.item-slots{flex-direction:column}}
#mod-list-outer{max-height:540px;overflow-y:auto;padding-right:4px}
</style>
</head>
<body>
<div id="app" style="padding:20px 14px;max-width:860px;margin:0 auto"></div>
<div id="mod-list-outer" style="display:none"></div>
<script>

const CATS=[
  {id:"weapon",name:"武器",subs:[
    {id:"1h",name:"單手武器",items:[{id:"claw",name:"爪"},{id:"dagger",name:"匕首"},{id:"wand",name:"法杖"},{id:"1hsword",name:"單手劍"},{id:"1haxe",name:"單手斧"},{id:"1hmace",name:"單手錘"},{id:"sceptre",name:"權杖"},{id:"runedagger",name:"符紋匕首"},{id:"rapier",name:"細劍"}]},
    {id:"2h",name:"雙手武器",items:[{id:"bow",name:"弓"},{id:"staff",name:"長杖"},{id:"2hsword",name:"雙手劍"},{id:"2haxe",name:"雙手斧"},{id:"2hmace",name:"雙手錘"},{id:"warstaff",name:"征戰長杖"},{id:"fishrod",name:"魚竿"}]}]},
  {id:"armour",name:"護甲",subs:[
    {id:"gloves",name:"手套",items:[{id:"gloves_str",name:"手套(力)"},{id:"gloves_dex",name:"手套(敏)"},{id:"gloves_int",name:"手套(智)"},{id:"gloves_strdex",name:"手套(力敏)"},{id:"gloves_strint",name:"手套(力智)"},{id:"gloves_dexint",name:"手套(敏智)"}]},
    {id:"boots",name:"鞋子",items:[{id:"boots_str",name:"鞋子(力)"},{id:"boots_dex",name:"鞋子(敏)"},{id:"boots_int",name:"鞋子(智)"},{id:"boots_strdex",name:"鞋子(力敏)"},{id:"boots_strint",name:"鞋子(力智)"},{id:"boots_dexint",name:"鞋子(敏智)"}]},
    {id:"body",name:"胸甲",items:[{id:"body_str",name:"胸甲(力)"},{id:"body_dex",name:"胸甲(敏)"},{id:"body_int",name:"胸甲(智)"},{id:"body_strdex",name:"胸甲(力敏)"},{id:"body_strint",name:"胸甲(力智)"},{id:"body_dexint",name:"胸甲(敏智)"},{id:"body_strdexint",name:"胸甲(力敏智)"}]},
    {id:"helmet",name:"頭部",items:[{id:"helm_str",name:"頭部(力)"},{id:"helm_dex",name:"頭部(敏)"},{id:"helm_int",name:"頭部(智)"},{id:"helm_strdex",name:"頭部(力敏)"},{id:"helm_strint",name:"頭部(力智)"},{id:"helm_dexint",name:"頭部(敏智)"}]}]},
  {id:"offhand",name:"副手",subs:[
    {id:"offhand_all",name:"副手",items:[{id:"quiver",name:"箭袋"},{id:"shield_str",name:"盾(力)"},{id:"shield_dex",name:"盾(敏)"},{id:"shield_int",name:"盾(智)"},{id:"shield_strdex",name:"盾(力敏)"},{id:"shield_strint",name:"盾(力智)"},{id:"shield_dexint",name:"盾(敏智)"}]}]},
  {id:"accessory",name:"飾品",subs:[{id:"acc_all",name:"飾品",items:[{id:"amulet",name:"項鍊"},{id:"ring",name:"戒指"},{id:"belt",name:"腰帶"}]}]}
];
const SRC_ORDER=["基本","塑界者","異界尊師","聖戰軍王","救贖者","狩獵者","總督軍","掘獄","時空穿越","隱匿","工藝台","精髓","獸獵","自定義"];
const SRC_COL={"基本":"#b0a090","塑界者":"#7aaad4","異界尊師":"#a0a0a0","聖戰軍王":"#d4c048","救贖者":"#7ad4d4","狩獵者":"#7ad4a0","總督軍":"#d47a7a","掘獄":"#c49060","時空穿越":"#c07ad4","隱匿":"#7ab4a0","工藝台":"#909090","精髓":"#c07ac0","獸獵":"#b09060","自定義":"#909090"};
const DIST={0:[1,0,0,0],1:[.41,.59,0,0],2:[0,.67,.33,0],3:[0,.33,.58,.09],4:[0,.10,.60,.30],5:[0,.03,.47,.50],6:[0,0,.30,.70]};

function C(n,k){if(k<0||k>n)return 0;if(!k||k===n)return 1;let r=1;for(let i=0;i<k;i++)r=r*(n-i)/(i+1);return r;}
function pSel(d,p,k){if(k<d||p<k||d>p)return 0;return C(p-d,k-d)/C(p,k);}
function calc(mA,mB,desSet,tB,ghostSet){
  const px=s=>s.filter(m=>m.t==="prefix"),sx=s=>s.filter(m=>m.t==="suffix");
  const tP=px(mA).length+px(mB).length,tS=sx(mA).length+sx(mB).length;
  const gCnt=(side,arr,type)=>arr.filter((_,i)=>ghostSet.has(side+"_"+i)&&_.t===type).length;
  const gP=gCnt("A",mA,"prefix")+gCnt("B",mB,"prefix"),gS=gCnt("A",mA,"suffix")+gCnt("B",mB,"suffix");
  const selP=tP-gP,selS=tS-gS;
  const gAP=new Set(px(mA).map(m=>m.g)),gBP=new Set(px(mB).map(m=>m.g));
  const gAS=new Set(sx(mA).map(m=>m.g)),gBS=new Set(sx(mB).map(m=>m.g));
  let dblP=0,dblS=0;
  gAP.forEach(g=>{if(gBP.has(g))dblP++;});gAS.forEach(g=>{if(gBS.has(g))dblS++;});
  const all=[...mA,...mB],dm=all.filter(m=>desSet.has(m._uid));
  const dP=new Set(dm.filter(m=>m.t==="prefix").map(m=>m.g)).size,dS=new Set(dm.filter(m=>m.t==="suffix").map(m=>m.g)).size;
  const exAll=all.filter(m=>m.ex).length,exDes=dm.filter(m=>m.ex).length;
  const poolP=Math.min(tP,6),poolS=Math.min(tS,6);
  const distP=DIST[poolP]||[1,0,0,0],distS=DIST[poolS]||[1,0,0,0];
  let raw=0;const bd=[];
  for(let fp=0;fp<=3;fp++)for(let fs=0;fs<=3;fs++){
    const pc=distP[fp]*distS[fs];if(!pc)continue;
    const apP=Math.min(fp,selP),apS=Math.min(fs,selS);
    if(apP<dP||apS<dS)continue;
    const s=pSel(dP,selP,apP)*pSel(dS,selS,apS);const c=pc*s;raw+=c;
    if(c>1e-4)bd.push({fp,fs,pc,s,c});
  }
  const bf=tB==="any"?1:.5,ep=exAll>1&&exDes>0?1/exAll:1,prob=raw*bf*ep;
  return{prob,raw,bf,ep,exp:prob>0?1/prob:Infinity,distP,distS,tP,tS,selP,selS,gP,gS,dblP,dblS,dP,dS,bd:bd.sort((a,b)=>b.c-a.c)};
}

let _uid=0;
const state={cat:"weapon",sub:"1h",item:"claw",mA:[],mB:[],des:new Set(),ghost:new Set(),tB:"any",tgt:"A",srch:"",fT:"all",fSrc:"all",modDB:null,loading:false,tierPicker:null,showImport:false,importText:"",showCustom:false,cN:"",cT:"prefix",cG:"",cE:false,cNn:false};
const modListDiv=document.getElementById("mod-list-outer");

function setState(patch){
  const sy=window.scrollY;
  const msy=modListDiv.scrollTop; // save mod list scroll
  Object.assign(state,patch);
  renderMain();
  window.scrollTo(0,sy);
  renderModList();
  modListDiv.scrollTop=msy; // restore mod list scroll after innerHTML=""
  renderModal();
}
function resetItems(){state.mA=[];state.mB=[];state.des=new Set();state.ghost=new Set();setState({});}

const modCache={};
async function loadMods(id){
  if(modCache[id]){state.modDB=modCache[id];state.loading=false;setState({});return;}
  state.loading=true;state.modDB=null;setState({});
  try{
    const r=await fetch("data/"+id+".json");
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();modCache[id]=d;state.modDB=d;state.loading=false;setState({});
  }catch{
    try{const s=localStorage.getItem("poe_recomb_"+id);if(s){const d=JSON.parse(s);modCache[id]=d;state.modDB=d;state.loading=false;setState({});return;}}catch{}
    state.modDB=null;state.loading=false;setState({});
  }
}
function importData(str){
  try{
    const d=JSON.parse(str);if(!d.item||!d.mods){alert("格式錯誤");return;}
    localStorage.setItem("poe_recomb_"+d.item,str);modCache[d.item]=d;
    if(d.item===state.item){state.modDB=d;resetItems();}
    state.showImport=false;state.importText="";setState({});
    alert("已匯入「"+d.name+"」（"+d.mods.length+" 組詞綴）");
  }catch(e){alert("JSON 解析失敗："+e.message);}
}

function h(tag,props,...children){
  const el=document.createElement(tag);
  if(props)for(const[k,v]of Object.entries(props)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)){if(c==null||c===false)continue;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);}
  return el;
}
function tagC(text,on,col,onClick){
  const b=h("button",{className:"tag",style:on?{borderColor:col,background:col+"18",color:col}:{},onClick});
  b.textContent=text;return b;
}

function renderModal(){
  document.querySelectorAll(".tier-modal").forEach(e=>e.remove());
  const s=state;if(!s.tierPicker)return;
  const mod=s.tierPicker.mod,side=s.tierPicker.side;
  const ov=h("div",{className:"overlay tier-modal",onClick:()=>setState({tierPicker:null})});
  const mo=h("div",{className:"modal",onClick:e=>e.stopPropagation()});
  const mh=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"14px"}});
  const mi=h("div",{});
  mi.appendChild(h("div",{style:{fontSize:"11px",color:"var(--t3)",letterSpacing:"2px",textTransform:"uppercase",marginBottom:"4px"}},"選擇階級"));
  mi.appendChild(h("div",{style:{fontSize:"17px",color:"var(--t1)",fontWeight:"600",lineHeight:"1.3"}},mod.n));
  const mm=h("div",{style:{display:"flex",gap:"8px",alignItems:"center",marginTop:"5px",flexWrap:"wrap"}});
  mm.appendChild(h("span",{style:{fontSize:"12px",color:side==="A"?"var(--blue)":"var(--red)",fontWeight:"600"}},"→ 物品 "+side));
  mm.appendChild(h("span",{style:{fontSize:"12px",color:mod.t==="prefix"?"var(--blue)":"var(--green)"}},mod.t==="prefix"?"前綴":"後綴"));
  mm.appendChild(h("span",{style:{fontSize:"12px",color:SRC_COL[mod.src]||"var(--t3)"}},mod.src));
  mm.appendChild(h("span",{className:"mono",style:{fontSize:"11px",color:"var(--t3)"}},"Pool: "+mod.g));
  mi.appendChild(mm);mh.appendChild(mi);
  mh.appendChild(h("button",{style:{background:"none",border:"none",color:"var(--t3)",fontSize:"22px",padding:"0 4px",lineHeight:"1"},onClick:()=>setState({tierPicker:null})},"✕"));
  mo.appendChild(mh);
  const tl=h("div",{style:{display:"flex",flexDirection:"column",gap:"4px"}});
  (mod.tiers||[]).forEach(tr=>{
    const btn=h("button",{className:"tier-btn",onClick:()=>{
      const setter=side==="A"?"mA":"mB";
      if(s[setter].some(m=>m.g===mod.g&&m.src===mod.src)){setState({tierPicker:null});return;}
      const arr=[...s[setter],{...mod,tier:tr.t,tierRoll:tr.roll,tierIlvl:tr.ilvl,_uid:"u"+(_uid++)}];
      setState({[setter]:arr,tierPicker:null});
    }});
    btn.appendChild(h("span",{className:"mono",style:{fontWeight:"700",color:"var(--gold)",minWidth:"36px",fontSize:"14px"}},"T"+tr.t));
    if(tr.pfx)btn.appendChild(h("span",{style:{fontSize:"12px",color:"var(--t3)",minWidth:"70px"}},"「"+tr.pfx+"」"));
    const rollSpan=h("span",{style:{flex:"1",fontSize:"13px"}});
    tr.roll.split(" / ").forEach((part,i,arr)=>{
      rollSpan.appendChild(document.createTextNode(part));
      if(i<arr.length-1)rollSpan.appendChild(h("br",{}));
    });
    btn.appendChild(rollSpan);
    btn.appendChild(h("span",{className:"mono",style:{fontSize:"11px",color:"var(--t3)",whiteSpace:"nowrap"}},"ilvl "+tr.ilvl));
    if(tr.w>0)btn.appendChild(h("span",{className:"mono",style:{fontSize:"11px",color:"var(--t4)"}}," w:"+tr.w));
    tl.appendChild(btn);
  });
  mo.appendChild(tl);ov.appendChild(mo);document.body.appendChild(ov);
}

function renderModList(){
  const s=state;
  const availMods=s.modDB?.mods||[];
  let filtered=availMods;
  if(s.fT!=="all")filtered=filtered.filter(m=>m.t===s.fT);
  if(s.fSrc!=="all")filtered=filtered.filter(m=>m.src===s.fSrc);
  if(s.srch){const t=s.srch.toLowerCase();filtered=filtered.filter(m=>m.n.toLowerCase().includes(t)||m.g.toLowerCase().includes(t));}
  modListDiv.innerHTML="";
  if(!s.modDB&&!s.loading){modListDiv.appendChild(h("div",{style:{textAlign:"center",padding:"30px",color:"var(--orange)",fontSize:"14px"}},"此裝備尚無詞綴資料，請匯入"));return;}
  if(s.loading){modListDiv.appendChild(h("div",{style:{textAlign:"center",padding:"30px",color:"var(--t3)",fontSize:"14px"}},"載入中..."));return;}

  function makeModRow(mod){
    const inA=s.mA.some(m=>m.id===mod.id),inB=s.mB.some(m=>m.id===mod.id);
    const dc=mod.t==="prefix"?"var(--blue)":"var(--green)";
    const row=h("div",{className:"mod-row",onClick:()=>{
      const arr=s.tgt==="A"?s.mA:s.mB;
      if(arr.filter(m=>m.t==="prefix").length>=3&&mod.t==="prefix")return;
      if(arr.filter(m=>m.t==="suffix").length>=3&&mod.t==="suffix")return;
      if(arr.some(m=>m.g===mod.g&&m.src===mod.src))return;
      setState({tierPicker:{mod,side:s.tgt}});
    }});
    row.appendChild(h("span",{style:{width:"6px",height:"6px",borderRadius:"50%",flexShrink:"0",background:dc}}));
    const ns=h("span",{style:{flex:"1",fontSize:"13px",lineHeight:"1.4"}});
    // Split compound mods on " / " for multiline display
    const nameParts=mod.n.split(" / ");
    nameParts.forEach((part,i)=>{
      ns.appendChild(document.createTextNode(part));
      if(i<nameParts.length-1)ns.appendChild(h("br",{}));
    });
    if(mod.ex)ns.appendChild(h("span",{style:{color:"var(--red)",fontSize:"10px",marginLeft:"4px"}},"排他"));
    if(mod.nnn)ns.appendChild(h("span",{style:{color:"var(--purple)",fontSize:"10px",marginLeft:"4px"}},"NNN"));
    row.appendChild(ns);
    const tr=mod.tiers?.length?"T"+mod.tiers[0].t+(mod.tiers.length>1?"-"+mod.tiers[mod.tiers.length-1].t:""):"";
    row.appendChild(h("span",{className:"mono",style:{fontSize:"10px",color:"var(--t3)",flexShrink:"0"}},tr));
    if(inA||inB){
      const b=h("div",{style:{display:"flex",gap:"2px",flexShrink:"0"}});
      if(inA)b.appendChild(h("span",{style:{fontSize:"9px",padding:"0 3px",background:"rgba(122,170,212,.2)",color:"var(--blue)",borderRadius:"2px"}},"A"));
      if(inB)b.appendChild(h("span",{style:{fontSize:"9px",padding:"0 3px",background:"rgba(212,122,122,.2)",color:"var(--red)",borderRadius:"2px"}},"B"));
      row.appendChild(b);
    }
    return row;
  }

  const bySrc={};
  filtered.forEach(m=>{if(!bySrc[m.src])bySrc[m.src]={prefix:[],suffix:[]};bySrc[m.src][m.t==="prefix"?"prefix":"suffix"].push(m);});
  const srcGroups=SRC_ORDER.filter(src=>bySrc[src]);
  if(!srcGroups.length&&availMods.length){modListDiv.appendChild(h("div",{style:{textAlign:"center",padding:"20px",color:"var(--t3)",fontSize:"14px"}},"沒有符合的詞綴"));return;}
  const onlyPre=s.fT==="prefix",onlySuf=s.fT==="suffix",both=s.fT==="all";
  srcGroups.forEach(src=>{
    const grp=bySrc[src],srcCol=SRC_COL[src]||"var(--t3)";
    const sh=h("div",{style:{padding:"5px 8px",background:"var(--bg3)",borderRadius:"4px",marginTop:"6px",borderLeft:"3px solid "+srcCol,display:"flex",alignItems:"center",gap:"8px"}});
    sh.appendChild(h("span",{style:{fontSize:"13px",fontWeight:"600",color:srcCol}},src));
    sh.appendChild(h("span",{className:"mono",style:{fontSize:"10px",color:"var(--t3)"}},
      (grp.prefix.length?"前×"+grp.prefix.length:"")+(grp.prefix.length&&grp.suffix.length?" · ":"")+(grp.suffix.length?"後×"+grp.suffix.length:"")));
    modListDiv.appendChild(sh);
    if(both){
      if(!grp.prefix.length&&!grp.suffix.length)return;
      // Two independent columns - no row alignment
      const wrap=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1px 1fr",marginTop:"2px"}});
      // Left: prefix column
      const leftCol=h("div",{style:{background:"rgba(122,170,212,.03)"}});
      if(grp.prefix.length){
        leftCol.appendChild(h("div",{style:{fontSize:"11px",color:"var(--blue)",padding:"3px 8px",background:"rgba(122,170,212,.06)"}},"◈ 前綴"));
        grp.prefix.forEach(m=>leftCol.appendChild(makeModRow(m)));
      }
      wrap.appendChild(leftCol);
      wrap.appendChild(h("div",{style:{background:"var(--border2)",width:"2px"}}));
      // Right: suffix column
      const rightCol=h("div",{style:{background:"rgba(122,212,160,.03)"}});
      if(grp.suffix.length){
        rightCol.appendChild(h("div",{style:{fontSize:"11px",color:"var(--green)",padding:"3px 8px",background:"rgba(122,212,160,.06)"}},"◈ 後綴"));
        grp.suffix.forEach(m=>rightCol.appendChild(makeModRow(m)));
      }
      wrap.appendChild(rightCol);
      modListDiv.appendChild(wrap);
    }else if(onlyPre)grp.prefix.forEach(m=>modListDiv.appendChild(makeModRow(m)));
    else if(onlySuf)grp.suffix.forEach(m=>modListDiv.appendChild(makeModRow(m)));
  });
}

function renderMain(){
  const app=document.getElementById("app");app.innerHTML="";
  const s=state;
  const curCat=CATS.find(c=>c.id===s.cat),curSub=curCat?.subs.find(ss=>ss.id===s.sub);
  const availMods=s.modDB?.mods||[];
  const sources=SRC_ORDER.filter(src=>availMods.some(m=>m.src===src));
  const allMods=[...s.mA.map((m,i)=>({...m,side:"A",idx:i})),...s.mB.map((m,i)=>({...m,side:"B",idx:i}))];
  const res=(s.mA.length||s.mB.length)?calc(s.mA,s.mB,s.des,s.tB,s.ghost):null;

  app.appendChild(h("div",{style:{textAlign:"center",marginBottom:"22px"}},
    h("div",{style:{fontSize:"11px",letterSpacing:"4px",color:"var(--t3)",textTransform:"uppercase"}},"Path of Exile 3.28 Mirage"),
